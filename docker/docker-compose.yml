# docker/docker-compose.yml

# =============================================================================
# PACT CONTRACT TESTING - DOCKER COMPOSE
# =============================================================================
# This file defines the complete infrastructure for contract testing:
# - Pact Broker: Stores and shares contracts between teams
# - DummyJSON: The provider API we're testing against
#
# Usage:
#   docker-compose up -d        # Start all services
#   docker-compose logs -f      # View logs
#   docker-compose down         # Stop all services
#   docker-compose down -v      # Stop and remove volumes
# =============================================================================

version: "3.8"

services:
  # ---------------------------------------------------------------------------
  # PACT BROKER
  # ---------------------------------------------------------------------------
  # Self-hosted contract storage with UI, versioning, and can-i-deploy checks
  #
  # Access: http://localhost:9292
  # Documentation: https://docs.pact.io/pact_broker
  # ---------------------------------------------------------------------------
  pact-broker:
    image: pactfoundation/pact-broker:latest
    container_name: pact-broker
    ports:
      - "9292:9292"
    environment:
      # Database configuration (SQLite for simplicity)
      # For production, use PostgreSQL (see commented section below)
      PACT_BROKER_DATABASE_URL: "sqlite:////tmp/pact_broker.sqlite3"

      # Basic settings
      PACT_BROKER_PORT: "9292"
      PACT_BROKER_LOG_LEVEL: "INFO"

      # Base URL (used for links in UI)
      PACT_BROKER_BASE_URL: "http://localhost:9292"

      # Public read access (disable authentication for reading)
      PACT_BROKER_PUBLIC_HEARTBEAT: "true"

      # Allow contracts to be published
      PACT_BROKER_DISABLE_SSL_VERIFICATION: "true"

      # Webhook configuration (optional)
      # PACT_BROKER_WEBHOOK_HOST_WHITELIST: "localhost jenkins github.com"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9292/diagnostic/status/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - pact-network

  # ---------------------------------------------------------------------------
  # DUMMYJSON PROVIDER
  # ---------------------------------------------------------------------------
  # Open-source REST API with pre-seeded data for testing
  #
  # Access: http://localhost:3000
  # Documentation: https://dummyjson.com/docs
  # ---------------------------------------------------------------------------
  dummyjson:
    image: ovi2406/dummyjson:latest
    container_name: dummyjson
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/products/1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - pact-network

  # ---------------------------------------------------------------------------
  # OPTIONAL: PostgreSQL Database for Pact Broker (Production)
  # ---------------------------------------------------------------------------
  # Uncomment this section for production deployments
  # ---------------------------------------------------------------------------
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: pact-postgres
  #   environment:
  #     POSTGRES_USER: pact
  #     POSTGRES_PASSWORD: pact_password
  #     POSTGRES_DB: pact_broker
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U pact"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   restart: unless-stopped
  #   networks:
  #     - pact-network
  #
  # To use PostgreSQL, update pact-broker environment:
  #   PACT_BROKER_DATABASE_URL: "postgres://pact:pact_password@postgres/pact_broker"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

networks:
  pact-network:
    name: pact-contract-testing
    driver: bridge

# Volumes for persistent data (when using PostgreSQL)
# volumes:
#   postgres-data:
