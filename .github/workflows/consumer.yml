# .github/workflows/consumer.yml

# =============================================================================
# CONSUMER CI/CD PIPELINE
# =============================================================================
# This workflow runs consumer contract tests and publishes contracts to the
# Pact Broker. It should run on every push/PR to ensure contracts are always
# up-to-date.
#
# Workflow:
# 1. Install dependencies
# 2. Run consumer Pact tests (generates contract files)
# 3. Publish contracts to Pact Broker (with version tagging)
# 4. Trigger provider verification via webhook
# =============================================================================

name: Consumer Contract Tests

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
    paths:
      - 'consumer/**'
      - 'pacts/**'
      - '.github/workflows/consumer.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'consumer/**'
      - '.github/workflows/consumer.yml'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish contracts to Pact Broker'
        required: false
        default: 'true'

env:
  NODE_VERSION: '18'
  PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_URL || 'http://localhost:9292' }}
  PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}

jobs:
  # ---------------------------------------------------------------------------
  # Consumer Contract Tests
  # ---------------------------------------------------------------------------
  consumer-tests:
    name: Run Consumer Pact Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for versioning

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run consumer Pact tests
        run: npm run test:pact
        working-directory: consumer
        env:
          PACT_LOG_LEVEL: info

      - name: Upload Pact contracts
        uses: actions/upload-artifact@v4
        with:
          name: pact-contracts
          path: pacts/*.json
          retention-days: 30
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Publish Contracts to Pact Broker
  # ---------------------------------------------------------------------------
  publish-contracts:
    name: Publish to Pact Broker
    runs-on: ubuntu-latest
    needs: consumer-tests
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Pact contracts
        uses: actions/download-artifact@v4
        with:
          name: pact-contracts
          path: pacts

      - name: List contract files
        run: ls -la pacts/

      - name: Setup Pact CLI
        run: |
          curl -LO https://github.com/pact-foundation/pact-ruby-standalone/releases/download/v2.4.2/pact-2.4.2-linux-x86_64.tar.gz
          tar -xzf pact-2.4.2-linux-x86_64.tar.gz
          echo "${PWD}/pact/bin" >> $GITHUB_PATH

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "version=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
            echo "branch=${{ github.head_ref }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Publish contracts to Pact Broker
        run: |
          pact-broker publish ./pacts \
            --consumer-app-version ${{ steps.version.outputs.version }} \
            --branch ${{ steps.version.outputs.branch }} \
            --broker-base-url ${{ env.PACT_BROKER_BASE_URL }} \
            --tag ${{ steps.version.outputs.branch }}
        env:
          PACT_BROKER_TOKEN: ${{ env.PACT_BROKER_TOKEN }}

      - name: Create deployment version
        if: github.ref == 'refs/heads/main'
        run: |
          pact-broker record-deployment \
            --pacticipant FrontendApp \
            --version ${{ steps.version.outputs.version }} \
            --environment production \
            --broker-base-url ${{ env.PACT_BROKER_BASE_URL }}
        env:
          PACT_BROKER_TOKEN: ${{ env.PACT_BROKER_TOKEN }}
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Can-I-Deploy Check
  # ---------------------------------------------------------------------------
  can-i-deploy:
    name: Can I Deploy?
    runs-on: ubuntu-latest
    needs: publish-contracts

    steps:
      - name: Setup Pact CLI
        run: |
          curl -LO https://github.com/pact-foundation/pact-ruby-standalone/releases/download/v2.4.2/pact-2.4.2-linux-x86_64.tar.gz
          tar -xzf pact-2.4.2-linux-x86_64.tar.gz
          echo "${PWD}/pact/bin" >> $GITHUB_PATH

      - name: Check if can deploy
        run: |
          pact-broker can-i-deploy \
            --pacticipant FrontendApp \
            --version ${{ github.sha }} \
            --to-environment production \
            --broker-base-url ${{ env.PACT_BROKER_BASE_URL }}
        env:
          PACT_BROKER_TOKEN: ${{ env.PACT_BROKER_TOKEN }}
